<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國立臺南大學 | 114學年度各系所學生組成</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000000;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        #header {
            position: absolute; top: 30px; width: 100%; text-align: center;
            pointer-events: none; z-index: 10;
        }
        #header h1 {
            margin: 0; font-size: 32px; font-weight: 900; letter-spacing: 6px;
            text-shadow: 0 0 25px rgba(255,255,255,0.4);
            color: #f0f4f8;
        }
        #header p { margin: 10px 0 0 0; color: #8a9bb2; font-size: 14px; letter-spacing: 3px;}

        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }

        /* NASA 級 HUD 懸浮面板 */
        #tooltip {
            position: absolute; top: -1000px; left: -1000px;
            background: rgba(4, 8, 16, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.25); border-radius: 8px;
            padding: 22px 28px; pointer-events: none; z-index: 9999;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 242, 254, 0.05);
            transition: opacity 0.25s ease; opacity: 0;
        }
        #tooltip h2 { 
            margin: 0 0 15px 0; font-size: 26px; font-weight: 800; color: #fff; 
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
            letter-spacing: 1px;
        }
        #tooltip .stat { font-size: 16px; margin: 10px 0; color: #a0aab5; }
        #tooltip .highlight { font-size: 22px; font-weight: bold; color: #fff; }
        #tooltip .click-hint { 
            margin-top: 22px; font-size: 14px; color: #00e5ff; 
            text-align: center; letter-spacing: 1px; font-weight: bold;
            animation: pulse 2s infinite; 
        }
        
        @keyframes pulse { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }
    </style>
</head>
<body>
    <div id="header">
        <h1>國立臺南大學 114學年度 各系所學生組成</h1>
        <p>每一個光點代表著一位學生 ｜ 互動式校務數據</p>
    </div>

    <div id="tooltip">
        <h2 id="tt-name">系所名稱</h2>
        <div class="stat">人數總計: <span class="highlight" id="tt-total">0</span> 人</div>
        <div class="stat">性別結構: <span class="highlight" id="tt-gender" style="color:#80b3ff;">男 0 | 女 0</span></div>
        <div class="stat">國際/延修: <span class="highlight" id="tt-warn" style="color:#ffd166;">境外 0 | 延修 0</span></div>
        <div class="click-hint">▶ 點擊開啟系所官網</div>
    </div>

    <div id="tooltip">
        <h2 id="tt-name">系所名稱</h2>
        <div class="stat">人數總計: <span class="highlight" id="tt-total">0</span> 人</div>
        <div class="stat">性別結構: <span class="highlight" id="tt-gender" style="color:#80b3ff;">男 0 | 女 0</span></div>
        <div class="stat">國際/延修: <span class="highlight" id="tt-warn" style="color:#ffd166;">境外 0 | 延修 0</span></div>
        <div class="click-hint">▶ 點擊開啟系所官網</div>
    </div>

    <canvas id="chart"></canvas>

    <script>
        const data = [
            {name: '教育學系', total: 698, male: 89, female: 609, url: 'https://edu.nutn.edu.tw/gac610/', overseas: 6, extending: 11},
            {name: '國語文學系', total: 393, male: 93, female: 300, url: 'https://chinese.nutn.edu.tw', overseas: 7, extending: 18},
            {name: '行政管理學系', total: 239, male: 72, female: 167, url: 'https://pam.nutn.edu.tw', overseas: 3, extending: 4},
            {name: '數位學習科技', total: 332, male: 172, female: 160, url: 'https://ilt.nutn.edu.tw', overseas: 5, extending: 6},
            {name: '視覺藝術設計', total: 287, male: 73, female: 214, url: 'https://fineart.nutn.edu.tw', overseas: 9, extending: 8},
            {name: '體育學系', total: 278, male: 178, female: 100, url: 'https://phyedu.nutn.edu.tw', overseas: 1, extending: 8},
            {name: '電機工程學系', total: 272, male: 213, female: 59, url: 'https://ee.nutn.edu.tw', overseas: 1, extending: 6},
            {name: '幼兒教育學系', total: 272, male: 15, female: 257, url: 'https://ece.nutn.edu.tw', overseas: 9, extending: 2},
            {name: '經營與管理系', total: 262, male: 125, female: 137, url: 'https://bm.nutn.edu.tw', overseas: 21, extending: 3},
            {name: '音樂學系', total: 256, male: 72, female: 184, url: 'https://music.nutn.edu.tw', overseas: 9, extending: 10},
            {name: '特殊教育學系', total: 253, male: 66, female: 187, url: 'https://sped.nutn.edu.tw', overseas: 8, extending: 3},
            {name: '英語學系', total: 243, male: 90, female: 153, url: 'https://english.nutn.edu.tw', overseas: 2, extending: 11},
            {name: '戲劇創作應用', total: 212, male: 63, female: 149, url: 'https://drama.nutn.edu.tw', overseas: 8, extending: 11},
            {name: '資訊工程學系', total: 211, male: 162, female: 49, url: 'https://csie.nutn.edu.tw', overseas: 5, extending: 10},
            {name: '應用數學系', total: 204, male: 138, female: 66, url: 'https://math.nutn.edu.tw', overseas: 0, extending: 6},
            {name: '諮商與輔導系', total: 345, male: 73, female: 272, url: 'https://cg.nutn.edu.tw', overseas: 11, extending: 4},
            {name: '文化自然資源', total: 251, male: 139, female: 112, url: 'https://cnr.nutn.edu.tw', overseas: 6, extending: 7},
            {name: '生態環境資源', total: 223, male: 102, female: 121, url: 'https://ecosci.nutn.edu.tw', overseas: 4, extending: 7},
            {name: '綠色能源科技', total: 336, male: 246, female: 90, url: 'https://greenergy.nutn.edu.tw', overseas: 1, extending: 6},
            {name: '生物科技學系', total: 210, male: 89, female: 121, url: 'https://bst.nutn.edu.tw', overseas: 3, extending: 5},
            {name: '材料科學系', total: 214, male: 148, female: 66, url: 'https://material.nutn.edu.tw', overseas: 0, extending: 3}
        ];

        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d", { alpha: false });
        let width = window.innerWidth, height = window.innerHeight;
        
        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr; canvas.height = height * dpr;
        ctx.scale(dpr, dpr);

        const colors = ['#00f2fe', '#4facfe', '#bd6afb', '#f5576c', '#43e97b', '#fa709a', '#f6d365', '#a18cd1', '#84fab0', '#cfd9df'];

        const pack = d3.pack()
            .size([width * 0.6, height * 0.8])
            .padding(Math.min(width, height) / 10); 
            
        const root = d3.hierarchy({children: data}).sum(d => Math.pow(d.total, 0.7));
        const nodes = pack(root).leaves();

        const particles = [];
        nodes.forEach((node, i) => {
            const dept = node.data;
            dept.color = colors[i % colors.length];
            dept.x = (node.x - width * 0.3) * 2.0 + width / 2;
            dept.x = Math.max(width * 0.05, Math.min(width * 0.95, dept.x));
            dept.y = node.y + height * 0.1;
            dept.r = node.r;

            for (let j = 0; j < dept.total; j++) {
                particles.push({
                    dept: dept,
                    x: dept.x + (Math.random() - 0.5) * dept.r * 3.5,
                    y: dept.y + (Math.random() - 0.5) * dept.r * 3.5,
                    radius: 0.6 + Math.random() * 1.3, 
                    vx: 0, vy: 0
                });
            }
        });

        const stars = Array.from({length: 400}, () => ({
            x: Math.random() * width, y: Math.random() * height,
            z: Math.random() * 2.5 + 0.2,
            baseAlpha: Math.random() * 0.6 + 0.1
        }));

        const simulation = d3.forceSimulation(particles)
            .force("x", d3.forceX(d => d.dept.x).strength(0.015))
            .force("y", d3.forceY(d => d.dept.y).strength(0.015))
            .force("collide", d3.forceCollide(d => d.radius * 2.2).strength(0.05)) 
            .alphaDecay(0.01);

        let hoveredDept = null;
        const tooltip = document.getElementById("tooltip");

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill(); ctx.stroke();
        }

        simulation.on("tick", () => {
            const grad = ctx.createRadialGradient(width/2, height/2, height*0.1, width/2, height/2, width*0.9);
            grad.addColorStop(0, "#080a15"); 
            grad.addColorStop(1, "#000002"); 
            ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = "#ffffff";
            stars.forEach(s => {
                s.x -= (s.z * 0.15); 
                if(s.x < 0) s.x = width;
                ctx.globalAlpha = s.baseAlpha;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.z * 0.6, 0, Math.PI*2); ctx.fill();
            });

            // 【關鍵修改：乾淨、優雅的星座連線】
            ctx.globalAlpha = 0.04; // 大幅降低透明度，避免刺眼
            ctx.strokeStyle = "#4facfe"; ctx.lineWidth = 1;
            
            for(let i=0; i<nodes.length; i++) {
                // 將每個節點與其他節點的距離排序，只取最近的 2 個節點連線
                let neighbors = [];
                for(let j=0; j<nodes.length; j++) {
                    if(i !== j) {
                        const dist = Math.hypot(nodes[i].data.x - nodes[j].data.x, nodes[i].data.y - nodes[j].data.y);
                        neighbors.push({index: j, dist: dist});
                    }
                }
                // 依距離排序，取最近的 2 個
                neighbors.sort((a, b) => a.dist - b.dist);
                const closest = neighbors.slice(0, 2);

                closest.forEach(n => {
                    // 加上距離限制，太遠就不連線，保持優雅的孤立感
                    if(n.dist < 280) {
                        ctx.beginPath(); 
                        ctx.moveTo(nodes[i].data.x, nodes[i].data.y); 
                        ctx.lineTo(nodes[n.index].data.x, nodes[n.index].data.y); 
                        ctx.stroke(); 
                    }
                });
            }

            ctx.globalCompositeOperation = "screen";
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                let alpha = 0.45; 
                if (hoveredDept && p.dept !== hoveredDept) alpha = 0.03; 
                if (hoveredDept && p.dept === hoveredDept) alpha = 0.9;  

                ctx.beginPath(); ctx.fillStyle = p.dept.color; ctx.globalAlpha = alpha;
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalCompositeOperation = "source-over"; 

            if (!hoveredDept) {
                ctx.font = "bold 13px sans-serif";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                nodes.forEach(node => {
                    const txt = node.data.name;
                    const tw = ctx.measureText(txt).width;
                    const px = node.data.x, py = node.data.y + node.data.r * 1.5 + 20; 
                    
                    ctx.fillStyle = "rgba(4, 8, 16, 0.75)";
                    ctx.strokeStyle = "rgba(0, 242, 254, 0.25)";
                    ctx.lineWidth = 1;
                    roundRect(ctx, px - tw/2 - 14, py - 14, tw + 28, 28, 14);
                    
                    ctx.fillStyle = "#ffffff"; ctx.globalAlpha = 1;
                    ctx.fillText(txt, px, py);
                });
            }
        });

        d3.select(canvas).on("mousemove", (event) => {
            const [mouseX, mouseY] = d3.pointer(event);
            let closest = null, minDist = Infinity;
            
            nodes.forEach(node => {
                const dist = Math.hypot(node.data.x - mouseX, node.data.y - mouseY);
                if (dist < node.data.r * 1.5 + 50 && dist < minDist) { minDist = dist; closest = node.data; }
            });

            if (closest !== hoveredDept) {
                hoveredDept = closest;
                if (hoveredDept) {
                    document.getElementById("tt-name").innerText = hoveredDept.name;
                    document.getElementById("tt-total").innerText = hoveredDept.total;
                    document.getElementById("tt-gender").innerText = `男 ${hoveredDept.male} | 女 ${hoveredDept.female}`;
                    const warnEl = document.getElementById("tt-warn");
                    warnEl.innerText = `境外 ${hoveredDept.overseas} | 延修 ${hoveredDept.extending}`;
                    warnEl.style.color = hoveredDept.extending > 10 ? "#ff5c5c" : "#00ffcc";

                    tooltip.style.opacity = 1;
                    
                    setTimeout(() => {
                        const ttRect = tooltip.getBoundingClientRect();
                        let tX = hoveredDept.x;
                        let tY = hoveredDept.y - hoveredDept.r * 1.5 - 40; 
                        
                        if (tX - ttRect.width / 2 < 20) tX = ttRect.width / 2 + 20;
                        if (tX + ttRect.width / 2 > width - 20) tX = width - ttRect.width / 2 - 20;
                        if (tY - ttRect.height < 20) {
                            tY = hoveredDept.y + hoveredDept.r * 1.5 + 40 + ttRect.height;
                        }
                        
                        tooltip.style.transform = `translate(-50%, -100%)`;
                        tooltip.style.left = tX + "px";
                        tooltip.style.top = tY + "px";
                    }, 0);

                    simulation.alpha(0.15).restart(); 
                    canvas.style.cursor = "pointer";
                } else {
                    tooltip.style.opacity = 0; 
                    tooltip.style.left = "-1000px";
                    simulation.alpha(0.05).restart();
                    canvas.style.cursor = "crosshair";
                }
            }
        });

        d3.select(canvas).on("click", () => {
            if (hoveredDept && hoveredDept.url) window.open(hoveredDept.url, '_blank');
        });

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width * dpr; canvas.height = height * dpr; ctx.scale(dpr, dpr);
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
